version: '3.8'

services:
  # ---- Banco de Dados PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: t_a_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-my_database}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - t_a_network
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-my_database}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend NestJS ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: project-dnd
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-my_database}
      PORT: ${PORT:-3001}
    ports:
      - '${PORT:-3001}:3001'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - t_a_network

volumes:
  postgres_data:
    driver: local

networks:
  t_a_network:
    driver: bridge
